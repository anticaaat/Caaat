<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>打工時數計算器</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { 
            overflow: hidden; 
            touch-action: none; 
            background-color: #f8fafc;
            -webkit-tap-highlight-color: transparent;
        }

        .calendar-grid { 
            display: grid; 
            grid-template-columns: repeat(7, 1fr); 
            gap: 4px; 
            align-items: stretch; 
        }
        
        .day-cell { 
            padding: 6px 4px; 
            transition: transform 0.1s ease, background-color 0.2s; 
            position: relative; 
            display: flex; 
            flex-direction: column; 
            border-radius: 12px; 
            border: 1px solid #e2e8f0;
            background-color: white;
            box-shadow: 0 1px 2px rgba(0,0,0,0.02);
            height: 100%;
            min-height: 60px;
        }
        
        .day-cell:active { transform: scale(0.95); background-color: #f1f5f9; }
        .is-weekend { background-color: #fff1f2 !important; }
        .is-holiday { background-color: #fef2f2 !important; border-color: #fecaca !important; }
        .is-today { outline: 2px solid #3b82f6; outline-offset: -1px; z-index: 5; background-color: #eff6ff !important; }
        
        .holiday-dot {
            position: absolute;
            top: 4px;
            right: 4px;
            width: 5px;
            height: 5px;
            background-color: #ef4444;
            border-radius: 50%;
        }

        #searchContainer {
            position: relative;
            height: 48px;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s ease;
        }

        #searchWrapper { 
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); 
            width: 44px; 
            height: 44px;
            overflow: hidden; 
            display: flex; 
            align-items: center; 
            background-color: #f1f5f9;
            border-radius: 9999px;
            position: relative;
            flex-shrink: 0;
            border: 1px solid #e2e8f0;
        }
        
        #searchWrapper.active { 
            flex-grow: 1;
            width: 100%;
            background-color: #f1f5f9; 
        }

        #searchInput { 
            opacity: 0; 
            transition: opacity 0.2s; 
            width: 100%; 
            font-size: 14px; 
            border: none; 
            background: transparent; 
            padding: 0 44px; 
            height: 100%;
            display: none;
        }
        
        #searchWrapper.active #searchInput { 
            opacity: 1; 
            display: block;
        }

        .icon-btn {
            width: 44px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #f1f5f9;
            border-radius: 9999px;
            border: 1px solid #e2e8f0;
            transition: all 0.2s;
            flex-shrink: 0;
        }
        
        .icon-btn svg {
            width: 20px;
            height: 20px;
            color: #64748b;
        }

        .ios-switch { position: relative; display: inline-block; width: 44px; height: 26px; }
        .ios-switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #e9e9ea; transition: .3s; border-radius: 26px; }
        .slider:before { position: absolute; content: ""; height: 22px; width: 22px; left: 2px; bottom: 2px; background-color: white; transition: .3s; border-radius: 50%; box-shadow: 0 2px 5px rgba(0,0,0,0.15); }
        input:checked + .slider { background-color: #34c759; }
        input:checked + .slider:before { transform: translateX(18px); }

        .picker-container {
            position: relative; height: 120px; overflow: hidden; display: flex; align-items: center; justify-content: center;
            background: #f8fafc; border-radius: 0.75rem;
            mask-image: linear-gradient(to bottom, transparent, black 35%, black 65%, transparent);
            -webkit-mask-image: linear-gradient(to bottom, transparent, black 35%, black 65%, transparent);
        }
        .picker-wheel { position: absolute; top: 0; width: 100%; display: flex; flex-direction: column; align-items: center; will-change: transform; cursor: ns-resize; touch-action: none; }
        .picker-item { height: 32px; line-height: 32px; font-size: 0.9rem; font-weight: 600; color: #94a3b8; user-select: none; }
        .picker-item.selected { color: #3b82f6; font-size: 1rem; font-weight: 800; }
        .picker-selection-bar { position: absolute; top: 50%; left: 0; right: 0; height: 32px; transform: translateY(-50%); background: rgba(59, 130, 246, 0.08); pointer-events: none; border-top: 1px solid rgba(59, 130, 246, 0.1); border-bottom: 1px solid rgba(59, 130, 246, 0.1); z-index: 10; }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        #monthView, #yearView { transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.3s ease; }
    </style>
</head>
<body class="text-slate-800 font-sans">

            <main id="monthView" class="p-4">

<script>
    const STORAGE_KEY = 'work_hours_v3_optimized';
    let currentDate = new Date();
    let selectedDateStr = "";
    let isYearView = false;
    let dynamicHolidays = {};
    
    let touchStartX = 0;
    let touchEndX = 0;
    let pinchStartDist = 0;
    const swipeThreshold = 50;

    let storageData = JSON.parse(localStorage.getItem(STORAGE_KEY)) || { 
        records: {}, 
        settings: { 
            defaultRate: 190, 
            defaultTitle: "上班", 
            defaultStartTime: "09:00", 
            defaultEndTime: "18:00", 
            defaultBreak: 0,
            showTitle: true,
            showTime: false,
            showHours: true,
            showSalary: true,
            showNote: false
        }
    };
    
    let workData = storageData.records;

    const RAW_HOLIDAYS_2026 = {
        "2026-01-01": "元旦", "2026-02-16": "除夕", "2026-02-17": "初一", "2026-02-18": "初二", "2026-02-19": "初三", "2026-02-28": "二二八", "2026-04-02": "兒童節", "2026-04-03": "清明節", "2026-05-01": "勞動節", "2026-06-19": "端午節", "2026-09-25": "中秋節", "2026-10-10": "國慶日"
    };

    function calculateHolidays() {
        dynamicHolidays = {};
        Object.entries(RAW_HOLIDAYS_2026).forEach(([dateStr, name]) => {
            dynamicHolidays[dateStr] = name;
            const date = new Date(dateStr);
            const dow = date.getDay();
            if (dow === 6) { 
                const prev = new Date(date); prev.setDate(date.getDate() - 1);
                dynamicHolidays[prev.toISOString().split('T')[0]] = `${name} 補假`;
            } else if (dow === 0) {
                const next = new Date(date); next.setDate(date.getDate() + 1);
                dynamicHolidays[next.toISOString().split('T')[0]] = `${name} 補假`;
            }
        });
    }

    class iOSPicker {
        constructor(containerId, options, initialValue, onChange) {
            this.container = document.getElementById(containerId);
            this.originalOptions = options;
            this.onChange = onChange;
            this.options = [...options, ...options, ...options];
            this.itemHeight = 32; this.offsetY = 44; this.currentY = 0;
            this.render(); this.initEvents(); this.setValue(initialValue);
        }
        render() {
            this.container.innerHTML = `<div class="picker-selection-bar"></div><div class="picker-wheel">${this.options.map(opt => `<div class="picker-item">${String(opt).padStart(2, '0')}</div>`).join('')}</div>`;
            this.wheel = this.container.querySelector('.picker-wheel');
            this.items = this.container.querySelectorAll('.picker-item');
        }
        initEvents() {
            let startY = 0, lastMoveY = 0;
            const onStart = (e) => { this.isDragging = true; startY = (e.touches ? e.touches[0].pageY : e.pageY); lastMoveY = startY; this.wheel.style.transition = 'none'; };
            const onMove = (e) => { 
                if (!this.isDragging) return; 
                const currentY = (e.touches ? e.touches[0].pageY : e.pageY); 
                const deltaY = currentY - lastMoveY;
                this.currentY += deltaY; 
                const totalH = this.originalOptions.length * this.itemHeight;
                if (this.currentY > -totalH/2) this.currentY -= totalH;
                if (this.currentY < -2.5*totalH) this.currentY += totalH;
                this.updateTransform(); lastMoveY = currentY;
            };
            const onEnd = () => { if (this.isDragging) { this.isDragging = false; this.snapToNearest(); } };
            this.container.addEventListener('touchstart', onStart, { passive: true });
            this.container.addEventListener('touchmove', onMove, { passive: true });
            this.container.addEventListener('touchend', onEnd);
            this.container.addEventListener('mousedown', onStart);
            window.addEventListener('mousemove', onMove);
            window.addEventListener('mouseup', onEnd);
        }
        snapToNearest() {
            this.selectedIndex = Math.round(Math.abs(this.currentY) / this.itemHeight);
            this.currentY = -this.selectedIndex * this.itemHeight;
            this.wheel.style.transition = 'transform 0.4s cubic-bezier(0.23, 1, 0.32, 1)';
            this.updateTransform(); if (this.onChange) this.onChange(this.getValue());
        }
        updateTransform() {
            this.wheel.style.transform = `translateY(${this.currentY + this.offsetY}px)`;
            const approx = Math.round(Math.abs(this.currentY) / this.itemHeight);
            this.items.forEach((item, i) => {
                const dist = Math.abs(i - (Math.abs(this.currentY) / this.itemHeight));
                item.classList.toggle('selected', i === approx);
                item.style.opacity = Math.max(0.2, 1 - dist * 0.4);
                item.style.transform = `scale(${Math.max(0.8, 1 - dist * 0.05)})`;
            });
        }
        getValue() { return this.originalOptions[this.selectedIndex % this.originalOptions.length]; }
        setValue(val) { 
            const idx = this.originalOptions.indexOf(parseInt(val)); 
            if (idx !== -1) { 
                this.selectedIndex = idx + this.originalOptions.length; 
                this.currentY = -this.selectedIndex * this.itemHeight; 
                this.updateTransform(); 
            } 
        }
    }

    let pickers = {};
    function init() {
        calculateHolidays();
        const hours = Array.from({length: 24}, (_, i) => i);
        const minutes = Array.from({length: 12}, (_, i) => i * 5);
        pickers.sH = new iOSPicker('startHourPicker', hours, 9, () => updatePreview());
        pickers.sM = new iOSPicker('startMinutePicker', minutes, 0, () => updatePreview());
        pickers.eH = new iOSPicker('endHourPicker', hours, 18, () => updatePreview());
        pickers.eM = new iOSPicker('endMinutePicker', minutes, 0, () => updatePreview());
        renderCalendar();
        setupGestureEvents();
    }

    function toggleView(forceView) {
        if (forceView === 'year') isYearView = true;
        else if (forceView === 'month') isYearView = false;
        else isYearView = !isYearView;

        document.getElementById('monthView').classList.toggle('hidden', isYearView);
        document.getElementById('yearView').classList.toggle('hidden', !isYearView);
        document.getElementById('navHeader').classList.toggle('hidden', isYearView);
        
        const labelSalary = document.getElementById('labelSalary');
        const labelHours = document.getElementById('labelHours');
        if (isYearView) {
            labelSalary.innerText = "年度預估總薪資";
            labelHours.innerText = "年度累計總工時";
        } else {
            labelSalary.innerText = "預估本月薪資";
            labelHours.innerText = "本月累計工時";
        }
        
        renderCalendar();
    }

    function toggleSettings() { 
        const overlay = document.getElementById('settingsOverlay');
        if (overlay.classList.contains('hidden')) {
            overlay.classList.remove('hidden');
            document.getElementById('settingDefaultRate').value = storageData.settings.defaultRate;
            document.getElementById('checkShowTitle').checked = storageData.settings.showTitle !== false;
            document.getElementById('checkShowTime').checked = storageData.settings.showTime === true;
            document.getElementById('checkShowHours').checked = storageData.settings.showHours !== false;
            document.getElementById('checkShowSalary').checked = storageData.settings.showSalary !== false;
            document.getElementById('checkShowNote').checked = storageData.settings.showNote === true;
            setTimeout(() => overlay.classList.add('opacity-100'), 10);
        } else {
            overlay.classList.remove('opacity-100');
            setTimeout(() => overlay.classList.add('hidden'), 300);
        }
    }

    function updateSetting(key, val) {
        storageData.settings[key] = val;
        localStorage.setItem(STORAGE_KEY, JSON.stringify(storageData));
        renderCalendar();
    }

    function saveSettings() { 
        storageData.settings.defaultRate = parseFloat(document.getElementById('settingDefaultRate').value) || 0; 
        localStorage.setItem(STORAGE_KEY, JSON.stringify(storageData)); 
        toggleSettings(); updateStats(); renderCalendar();
    }

    function renderCalendar() {
        const y = currentDate.getFullYear(), m = currentDate.getMonth();
        document.getElementById('yearDisplay').innerText = `${y}年`;
        if (isYearView) {
            document.getElementById('yearHeaderIos').innerText = y;
            renderYearView(y);
        } else { 
            document.getElementById('monthDisplay').innerText = `${m + 1}月`; 
            renderMonthView(y, m); 
        }
        updateStats();
    }

    function renderMonthView(year, month) {
        const daysInMonth = new Date(year, month + 1, 0).getDate(), firstDay = new Date(year, month, 1).getDay();
        const grid = document.getElementById('calendarDays'); grid.innerHTML = '';
        const todayStr = new Date().toLocaleDateString('en-CA');
        const s = storageData.settings;
        
        for (let i = 0; i < firstDay; i++) grid.appendChild(document.createElement('div'));
        
        for (let d = 1; d <= daysInMonth; d++) {
            const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
            const isW = [0, 6].includes(new Date(year, month, d).getDay()), isH = !!dynamicHolidays[dateStr], data = workData[dateStr], el = document.createElement('div');
            el.className = `day-cell cursor-pointer ${isH ? 'is-holiday' : (isW ? 'is-weekend' : '')}`;
            if (dateStr === todayStr) el.classList.add('is-today');
            
            let infoHtml = '';
            if (data) {
                const mult = isH ? 2 : 1;
                const totalPay = Math.round(data.hours * data.rate * mult);
                infoHtml = `<div class="cell-info-wrapper flex flex-col gap-1 mt-1">`;
                if (s.showTitle !== false) infoHtml += `<div class="text-[9px] font-black leading-tight truncate">${data.title}</div>`;
                if (s.showTime === true) infoHtml += `<div class="text-[7px] text-slate-400 font-bold">${data.startTime}-${data.endTime}</div>`;
                if (s.showHours !== false) infoHtml += `<div class="text-[8px] text-blue-500 font-black">${data.hours.toFixed(1)}h</div>`;
                if (s.showSalary !== false) infoHtml += `<div class="text-[10px] font-black text-slate-900">$${totalPay.toLocaleString()}</div>`;
                infoHtml += `</div>`;
            }
            
            el.innerHTML = `<div class="text-[10px] font-black ${isH || isW ? 'text-red-500' : 'text-slate-400'}">${d}</div>${isH ? '<div class="holiday-dot"></div>' : ''}${infoHtml}`;
            el.onclick = () => openModal(dateStr);
            grid.appendChild(el);
        }
    }

    function renderYearView(year) {
        const container = document.getElementById('yearMonthsIos'); container.innerHTML = '';
        const months = ["1月", "2月", "3月", "4月", "5月", "6月", "7月", "8月", "9月", "10月", "11月", "12月"];
        const todayStr = new Date().toLocaleDateString('en-CA');
        for (let m = 0; m < 12; m++) {
            const mDiv = document.createElement('div'); mDiv.className = 'text-left active:opacity-50 transition-opacity';
            let h = `<div class="text-[12px] font-black mb-1">${months[m]}</div><div class="grid grid-cols-7 gap-px">`;
            const dim = new Date(year, m + 1, 0).getDate(), fd = new Date(year, m, 1).getDay();
            for (let i = 0; i < fd; i++) h += `<div></div>`;
            for (let d = 1; d <= dim; d++) {
                const ds = `${year}-${String(m + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
                const hasR = !!workData[ds], isT = ds === todayStr, isH = !!dynamicHolidays[ds], isW = [0,6].includes(new Date(year,m,d).getDay());
                let baseCls = 'text-[7px] h-3.5 w-3.5 flex items-center justify-center ';
                let textCls = isH ? 'text-red-500 font-black' : (isW ? 'text-red-300 font-bold' : (isT ? 'text-white' : (hasR ? 'text-slate-900 font-bold' : 'text-slate-300')));
                let bgCls = isT ? 'bg-blue-500 rounded-full' : (hasR ? 'bg-slate-200 rounded-sm' : '');
                h += `<div class="${baseCls} ${bgCls} ${textCls}">${d}</div>`;
            }
            mDiv.innerHTML = h + `</div>`; 
            mDiv.onclick = () => { currentDate.setMonth(m); toggleView('month'); };
            container.appendChild(mDiv);
        }
    }

    function changeDate(v) { 
        const viewId = isYearView ? 'yearView' : 'monthView';
        const view = document.getElementById(viewId);
        view.style.transform = `translateX(${v * -20}px)`;
        view.style.opacity = '0';
        setTimeout(() => {
            if (isYearView) currentDate.setFullYear(currentDate.getFullYear() + v);
            else currentDate.setMonth(currentDate.getMonth() + v);
            renderCalendar();
            view.style.transform = `translateX(${v * 20}px)`;
            setTimeout(() => { view.style.transform = 'translateX(0)'; view.style.opacity = '1'; }, 10);
        }, 150);
    }
    
    function goToToday() { currentDate = new Date(); if (isYearView) toggleView('month'); renderCalendar(); }

    function toggleBreakInput(forceState) {
        const btn = document.getElementById('breakBtn'), wrap = document.getElementById('breakInputWrapper');
        let isActive = forceState !== undefined ? forceState : !btn.classList.contains('bg-blue-600');
        if (isActive) { btn.innerText = "有休息"; btn.classList.replace('bg-slate-200', 'bg-blue-600'); btn.classList.replace('text-slate-500', 'text-white'); wrap.classList.remove('hidden'); } 
        else { btn.innerText = "無休息"; btn.classList.replace('bg-blue-600', 'bg-slate-200'); btn.classList.replace('text-white', 'text-slate-500'); wrap.classList.add('hidden'); document.getElementById('breakMinutes').value = 0; }
        updatePreview();
    }

    function openModal(dateStr) {
        selectedDateStr = dateStr;
        const data = workData[dateStr] || { 
            title: storageData.settings.defaultTitle, 
            rate: storageData.settings.defaultRate, 
            startTime: storageData.settings.defaultStartTime, 
            endTime: storageData.settings.defaultEndTime, 
            breakMinutes: storageData.settings.defaultBreak, 
            note: "" 
        };
        document.getElementById('modalDate').innerText = dateStr.replace(/-/g, '/');
        document.getElementById('inputTitle').value = data.title;
        document.getElementById('inputRate').value = data.rate;
        document.getElementById('breakMinutes').value = data.breakMinutes || 0;
        document.getElementById('inputNote').value = data.note || "";
        toggleBreakInput((data.breakMinutes || 0) > 0);
        const hName = dynamicHolidays[dateStr], tag = document.getElementById('holidayTag');
        if (hName) { tag.innerText = `${hName} 2x`; tag.classList.remove('hidden'); } else tag.classList.add('hidden');
        const [sh, sm] = data.startTime.split(':').map(Number), [eh, em] = data.endTime.split(':').map(Number);
        pickers.sH.setValue(sh); pickers.sM.setValue(sm); pickers.eH.setValue(eh); pickers.eM.setValue(em);
        updatePreview(); 
        document.getElementById('editModal').classList.replace('hidden', 'flex');
    }

    function updatePreview() {
        const sh = pickers.sH.getValue(), sm = pickers.sM.getValue(), eh = pickers.eH.getValue(), em = pickers.eM.getValue();
        const rate = parseFloat(document.getElementById('inputRate').value) || 0, breakMins = parseInt(document.getElementById('breakMinutes').value) || 0;
        let diff = (eh * 60 + em) - (sh * 60 + sm); if (diff < 0) diff += 1440;
        const netHrs = Math.max(0, diff - breakMins) / 60, mult = !!dynamicHolidays[selectedDateStr] ? 2 : 1;
        document.getElementById('previewGrossHours').innerText = `${netHrs.toFixed(2)}h`;
        document.getElementById('previewNetSalary').innerText = `$${Math.round(netHrs * rate * mult).toLocaleString()}`;
    }

    function saveData() {
        const title = document.getElementById('inputTitle').value || "上班", rate = parseFloat(document.getElementById('inputRate').value) || 0, breakMins = parseInt(document.getElementById('breakMinutes').value) || 0, note = document.getElementById('inputNote').value;
        const sT = `${String(pickers.sH.getValue()).padStart(2,'0')}:${String(pickers.sM.getValue()).padStart(2,'0')}`, eT = `${String(pickers.eH.getValue()).padStart(2,'0')}:${String(pickers.eM.getValue()).padStart(2,'0')}`;
        let diff = (pickers.eH.getValue() * 60 + pickers.eM.getValue()) - (pickers.sH.getValue() * 60 + pickers.sM.getValue());
        if (diff < 0) diff += 1440;
        workData[selectedDateStr] = { title, hours: Math.max(0, diff - breakMins)/60, rate, startTime: sT, endTime: eT, breakMinutes: breakMins, note };
        storageData.settings.defaultTitle = title; storageData.settings.defaultStartTime = sT; storageData.settings.defaultEndTime = eT; storageData.settings.defaultBreak = breakMins;
        localStorage.setItem(STORAGE_KEY, JSON.stringify(storageData)); 
        closeModal(); renderCalendar();
    }

    function deleteEntry() { if (workData[selectedDateStr]) { delete workData[selectedDateStr]; localStorage.setItem(STORAGE_KEY, JSON.stringify(storageData)); closeModal(); renderCalendar(); } }
    function closeModal() { document.getElementById('editModal').classList.replace('flex', 'hidden'); }

    function updateStats() {
        let sal = 0, hrs = 0;
        const prefix = isYearView ? `${currentDate.getFullYear()}-` : `${currentDate.getFullYear()}-${String(currentDate.getMonth() + 1).padStart(2, '0')}-`;
        Object.keys(workData).forEach(d => { if (d.startsWith(prefix)) { hrs += workData[d].hours; sal += workData[d].hours * workData[d].rate * (!!dynamicHolidays[d] ? 2 : 1); } });
        document.getElementById('totalHoursNet').innerHTML = `${hrs.toFixed(1)} <span class="text-[10px] font-normal opacity-40">hr</span>`;
        document.getElementById('totalSalaryNet').innerText = `$${Math.round(sal).toLocaleString()}`;
    }

    function openSearch() { 
        // 核心修正：將 Today 按鈕與設定按鈕設為 hidden，讓搜尋欄能 flex-grow 到最右側
        document.getElementById('centerActions').classList.add('hidden'); 
        document.getElementById('settingsBtn').classList.add('hidden'); 
        
        const wrapper = document.getElementById('searchWrapper');
        wrapper.classList.add('active'); 
        
        document.getElementById('clearSearchBtn').classList.remove('hidden');
        setTimeout(() => {
            const input = document.getElementById('searchInput');
            input.focus();
        }, 50); 
    }

    function closeSearch() { 
        document.getElementById('searchWrapper').classList.remove('active'); 
        
        // 恢復按鈕顯示
        document.getElementById('centerActions').classList.remove('hidden'); 
        document.getElementById('settingsBtn').classList.remove('hidden'); 
        
        document.getElementById('clearSearchBtn').classList.add('hidden');
        document.getElementById('searchInput').value = ''; 
        document.getElementById('searchResultsOverlay').classList.add('hidden'); 
    }
    
    function execSearch() {
        const q = document.getElementById('searchInput').value.trim().toLowerCase(), overlay = document.getElementById('searchResultsOverlay');
        if (!q) { overlay.classList.add('hidden'); return; }
        overlay.innerHTML = '';
        const matched = Object.keys(workData).filter(d => workData[d].title.toLowerCase().includes(q) || (workData[d].note && workData[d].note.toLowerCase().includes(q))).sort((a,b) => b.localeCompare(a));
        if (matched.length) {
            overlay.classList.remove('hidden');
            matched.forEach(d => {
                const item = workData[d], div = document.createElement('div');
                div.className = "bg-slate-50 p-4 rounded-2xl flex justify-between items-center active:bg-slate-100 mb-2 border border-slate-100 transition-colors";
                div.onclick = () => { openModal(d); closeSearch(); };
                div.innerHTML = `<div><p class="text-[9px] font-black text-blue-500 uppercase tracking-tighter">${d.replace(/-/g, '/')}</p><p class="font-bold text-slate-900">${item.title}</p></div><div class="text-right"><p class="font-black text-slate-800">$${Math.round(item.hours * item.rate).toLocaleString()}</p><p class="text-[9px] font-bold text-slate-400">${item.hours.toFixed(1)}h</p></div>`;
                overlay.appendChild(div);
            });
        } else {
            overlay.classList.remove('hidden');
            overlay.innerHTML = '<p class="text-center py-8 text-slate-400 font-bold text-sm">找不到相關紀錄...</p>';
        }
    }
    
    function handleSearchBlur() { 
        setTimeout(() => { 
            if (document.getElementById('searchInput').value.trim() === "") closeSearch(); 
        }, 200); 
    }

    function getPinchDist(e) {
        return Math.hypot(
            e.touches[0].pageX - e.touches[1].pageX,
            e.touches[0].pageY - e.touches[1].pageY
        );
    }

    function setupGestureEvents() {
        const area = document.getElementById('app');
        
        area.addEventListener('touchstart', (e) => {
            if (e.touches.length === 1) {
                touchStartX = e.touches[0].pageX;
            } else if (e.touches.length === 2) {
                pinchStartDist = getPinchDist(e);
            }
        }, { passive: true });

        area.addEventListener('touchmove', (e) => {
            if (e.touches.length === 2 && pinchStartDist > 0) {
                e.preventDefault();
                const currentDist = getPinchDist(e);
                const ratio = currentDist / pinchStartDist;
                
                if (!isYearView && ratio < 0.75) {
                    toggleView('year');
                    pinchStartDist = 0; 
                }
            }
        }, { passive: false });

        area.addEventListener('touchend', (e) => {
            if (e.changedTouches.length === 1 && e.touches.length === 0) {
                touchEndX = e.changedTouches[0].pageX;
                handleSwipeAction();
            }
            pinchStartDist = 0;
        }, { passive: true });

        let isDrag = false;
        area.addEventListener('mousedown', (e) => { isDrag = true; touchStartX = e.pageX; });
        window.addEventListener('mouseup', (e) => { if (!isDrag) return; isDrag = false; touchEndX = e.pageX; handleSwipeAction(); });
    }

    function handleSwipeAction() {
        const deltaX = touchEndX - touchStartX;
        if (Math.abs(deltaX) > swipeThreshold) {
            if (deltaX > 0) changeDate(-1);
            else changeDate(1);
        }
    }

    window.onload = init;
</script>
</body>
